[platformio]
default_envs = esp01_1m

[env:esp01_1m]
platform = espressif8266@4.2.1
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
  bblanchon/ArduinoJson@^7.1.0

build_flags =
  -std=gnu++17
  -D FM_DEVICE_NAME=\"front-door-esp01s\"
  -D FM_WIFI_SSID=\"YOUR_WIFI_SSID\"
  -D FM_WIFI_PASSWORD=\"YOUR_WIFI_PASSWORD\"
  -D FM_API_BASE_URL=\"https://example.com\"
  -D FM_DEVICE_TOKEN=\"YOUR_DEVICE_TOKEN\"
  -D FM_WAIT_COMMAND_PATH=\"/api/device/wait-command\"
  -D FM_COMMAND_RESULT_PATH=\"/api/device/command-result\"
  -D FM_RELAY_PIN=2
  -D FM_RELAY_ACTIVE_HIGH=0
  -D FM_MAX_RELAY_PULSE_MS=3000
  -D FM_TLS_CERT_FINGERPRINT=\"AABBCCDDEEFF00112233445566778899AABBCCDD\"
  -D FM_WIFI_CONNECT_TIMEOUT_MS=30000
  -D FM_RECONNECT_JITTER_MIN_MS=100
  -D FM_RECONNECT_JITTER_MAX_MS=500
  -D FM_OTA_HOSTNAME=\"flatmanager-front-door\"
  -D FM_OTA_PASSWORD=\"CHANGE_ME_OTA_PASSWORD\"
  -D FM_NTP_SERVER_1=\"pool.ntp.org\"
  -D FM_NTP_SERVER_2=\"time.nist.gov\"
  -D FM_NTP_SERVER_3=\"time.google.com\"
  -D FM_DEFAULT_POLL_TIMEOUT_MS=60000
  -D FM_DEFAULT_HTTP_TIMEOUT_MS=70000
