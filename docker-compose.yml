services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: ${IMAGE_REPO:-flatmanager}/api:${TAG:-latest}
    env_file:
      - ./api/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DOCS_URL: ${DOCS_URL:-/api/docs}
      REDOC_URL: ${REDOC_URL:-/api/redoc}
      OPENAPI_URL: ${OPENAPI_URL:-/api/openapi.json}
      DATABASE_URL: sqlite:///./data/flatmanager.db
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
    restart: unless-stopped

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_GUEST_BASE_URL: ${VITE_GUEST_BASE_URL:-http://localhost:8081}
        VITE_BASE_PATH: ${ADMIN_BASE_PATH:-/admin/}
    image: ${IMAGE_REPO:-flatmanager}/admin-ui:${TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  guest-ui:
    build:
      context: ./guest-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_BASE_PATH: ${GUEST_BASE_PATH:-/guest/}
    image: ${IMAGE_REPO:-flatmanager}/guest-ui:${TAG:-latest}
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped
